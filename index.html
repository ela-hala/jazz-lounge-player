<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Velvet Airwaves — Jazz Lounge</title>

  <!-- Fonts (swap if you prefer a different mood) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --deep: #2b0000;
      --accent: #7f1212;    /* crimson */
      --gold: #b98b4a;
      --cream: #f6e9db;
      --card-w: 760px;
      --bg: url('https://raw.githubusercontent.com/ela-hala/jazz-lounge-player/main/velvet-bg.jpg'); /* Replace with your moodboard background image */
    }

    html,body{height:100%;margin:0;font-family:Montserrat, system-ui, sans-serif;color:var(--cream);background:
      linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
      var(--bg) center/cover no-repeat; -webkit-font-smoothing:antialiased;}

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 24px;
    }

    .card{
      width: min(var(--card-w), 94vw);
      display:flex;
      gap:24px;
      background: rgba(10,5,3,0.45);
      border: 1px solid rgba(189,145,92,0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border-radius:14px;
      overflow:hidden;
      padding:18px;
      align-items:center;
    }

    .left {
      width: 260px;
      min-width: 170px;
      height: 170px;
      border-radius:8px;
      overflow:hidden;
      background: linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.35));
      box-shadow: inset 0 1px 10px rgba(0,0,0,0.5);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .art {
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
      border-radius:6px;
      transition: transform .35s ease;
    }

    .right{flex:1;display:flex;flex-direction:column;gap:12px;padding:6px 4px;}
    h1 {font-family: Playfair Display, serif; margin:0; font-size:20px; letter-spacing:0.6px; color:var(--cream);}
    .meta {color: #f0e7d9; opacity:0.9; font-size:14px;}
    .controls {display:flex; gap:8px; align-items:center; margin-top:6px;}
    button.control {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color:var(--cream);
      padding:10px 12px;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }
    button.control:hover{transform:translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.5);}
    .play {background: linear-gradient(180deg, rgba(127,18,18,0.95), rgba(90,12,12,0.9)); border: none;}
    .vol {width:110px;}
    input[type=range] { -webkit-appearance: none; width:100%; height:6px; background: rgba(255,255,255,0.06); border-radius:6px;}
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:var(--gold); border-radius:50%; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }

    .progress {height:8px; background: rgba(255,255,255,0.05); border-radius:8px; overflow:hidden; cursor:pointer;}
    .progress-bar {height:100%; width:0%; background: linear-gradient(90deg,var(--gold), #d48e5f);}
    .small {font-size:12px; color: rgba(245,230,200,0.9);}

    /* hidden/remote player iframe */
    #player{ width:1px; height:1px; position:absolute; left:-9999px; top:auto; }

    /* responsive tweaks */
    @media (max-width:720px){
      .card{flex-direction:column; align-items:stretch;}
      .left{width:100%; height:260px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-label="Jazz lounge music player">
      <div class="left">
        <div id="art" class="art" style="background-image:url('REPLACE_BG_URL');"></div>
      </div>

      <div class="right">
        <h1>Velvet Airwaves</h1>
        <div class="meta">
          <div id="track-title">Playlist: Velvet Airwaves</div>
          <div class="small" id="track-info">A custom lounge playlist</div>
        </div>

        <div class="controls" aria-hidden="false">
          <button class="control" id="prev" title="Previous (←)">⟵</button>
          <button class="control play" id="play" title="Play / Pause (space)">▶</button>
          <button class="control" id="next" title="Next (→)">⟶</button>
          <div style="flex:1;"></div>
          <div style="width:120px;">
            <input id="vol" class="vol" type="range" min="0" max="100" step="1" value="50" aria-label="Volume">
          </div>
        </div>

        <div style="margin-top:10px;">
          <div class="progress" id="progress" aria-label="Playback progress">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden YouTube player (required for API) -->
  <div id="player"></div>

  <script>
    /***** CONFIG: replace placeholders below *****/
    const PLAYLIST_ID = 'PL_DUbnZPH5bh5yNbJZB3OnF2VT1O2No8J'; // e.g. PLxxxxxxxxxxxxxxxx
    const FALLBACK_BG = 'https://raw.githubusercontent.com/ela-hala/jazz-lounge-player/main/velvet-bg.jpg';      // a hosted image URL (from moodboard)
    /*********************************************/

    // UI refs
    const art = document.getElementById('art');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const vol = document.getElementById('vol');
    const titleEl = document.getElementById('track-title');
    const infoEl = document.getElementById('track-info');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progress-bar');

    // load YT IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '0', width: '0',
        playerVars: {
          listType: 'playlist',
          list: PLAYLIST_ID,
          autoplay: 0,
          controls: 0,
          rel: 0,
          modestbranding: 1,
          iv_load_policy: 3,
        },
        events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
      });
    }

    function onPlayerReady(){
      // sensible defaults
      try{ player.setVolume(50); }catch(e){}
      updateTrackInfo();
      // small interval to update progress UI
      setInterval(updateProgressUI, 350);
    }

    function onPlayerStateChange(){
      updateTrackInfo();
      // update play button icon
      const state = player.getPlayerState();
      playBtn.textContent = (state === YT.PlayerState.PLAYING) ? '❚❚' : '▶';
    }

    function updateTrackInfo(){
      if(!player || !player.getVideoData) return;
      const data = player.getVideoData() || {};
      const vid = data.video_id || null;
      titleEl.textContent = data.title || 'Velvet Airwaves';
      infoEl.textContent = vid ? `Now playing • ${data.author || ''}` : 'Playlist';
      if(vid){
        art.style.backgroundImage = `url('https://i.ytimg.com/vi/${vid}/hqdefault.jpg')`;
      } else {
        art.style.backgroundImage = `url('${FALLBACK_BG}')`;
      }
    }

    // Controls
    playBtn.addEventListener('click', () => {
      if(!player) return;
      const state = player.getPlayerState();
      if(state === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    });
    prevBtn.addEventListener('click', () => { if(player) player.previousVideo(); });
    nextBtn.addEventListener('click', () => { if(player) player.nextVideo(); });

    vol.addEventListener('input', (e)=> {
      if(player && player.setVolume) player.setVolume(Number(e.target.value));
    });

    // Progress bar (click to seek)
    progress.addEventListener('click', (e) => {
      if(!player || !player.getDuration) return;
      const rect = progress.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pct = Math.max(0, Math.min(1, x / rect.width));
      const dur = player.getDuration();
      if(dur) player.seekTo(dur * pct, true);
    });

    function updateProgressUI(){
      if(!player || !player.getDuration) return;
      const duration = player.getDuration();
      const current = player.getCurrentTime();
      if(duration > 0 && !isNaN(current)){
        const pct = Math.max(0, Math.min(100, (current/duration)*100));
        progressBar.style.width = pct + '%';
      }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', (ev) => {
      if(ev.code === 'Space'){ ev.preventDefault(); playBtn.click(); }
      if(ev.key === 'ArrowRight') nextBtn.click();
      if(ev.key === 'ArrowLeft') prevBtn.click();
    });

    // If playlist ID not replaced, show a friendly message
    window.addEventListener('load', () => {
      if(PLAYLIST_ID === 'REPLACE_PLAYLIST_ID'){
        titleEl.textContent = 'Replace REPLACE_PLAYLIST_ID with your YouTube playlist ID';
      }
    });
  </script>
</body>
</html>
